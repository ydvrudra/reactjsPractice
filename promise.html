const ticket  = new Promise((resolve,reject)=>{
    
    const isFlight = false;

    if(isFlight)
    {

        resolve("you are not in the flight");
    }
    else
    {
        setTimeout(() => {
            reject("your flight has been cancelled");

        }, 2000);
        
    }
});
ticket.then((val)=>{
    console.log("wohoo" ,val);
});
ticket.catch((val)=>{
    console.log("oh no",val);
});
