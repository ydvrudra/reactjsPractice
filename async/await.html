// best example od async await promise


const getpizza = () =>
{
    return new Promise((resolve,reject)=>{
        setTimeout(()=>{
            const pizza = "🍕";
            console.log("here is your pizza",pizza);
            resolve(pizza);
        },4000);

    })
}
//console.log(getpizza());

async function order()
{
    let pizza = await getpizza();
    console.log(pizza);
}
order();
