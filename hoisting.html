<script>

    // 1. example 

sum(10,20);
function sum(a,b)
{
    c = a+b;
    console.log("the sum of two no",c);
} 



// 2. example 

sum(2,3); // function expression par hoisting work nahi karta
console.log(sum) // undefined 
var sum = function(a,b)
{
    c = a+b;
    console.log(c);

}
sum(2,3);
