// 3. child class inherit from parent class


class employee{
    constructor(name,age,address)
    {
        this.name = name;
        this.age = age;
        this.address= address;
    }
    //instance method
    biodata()
    {
        return `hii my name is  ${this.name} . i am ${this.age} years old  . my address is ${this.address}`;
    }
}
   class player extends employee {
    constructor(name,age,address,game){
        super(name,age,address);
        this.game = game;
    }
      player_biodata()
    {
        return`${super.biodata()}. i am player of ${this.game}.`;
    }


   }

    

let obj1 = new player("vipin",21,"bhopal","cricket");
